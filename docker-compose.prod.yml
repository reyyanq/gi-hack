services:
  neo4j:
    image: neo4j:5-community
    container_name: leads-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-password}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-password} 'RETURN 1'"]
      interval: 10s
      timeout: 30s
      retries: 20
      start_period: 30s
    networks:
      - leads-internal

  app:
    image: ghcr.io/tobias-weiss-ai-xr/gi-hack:latest
    container_name: leads-app
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}
      NODE_ENV: production
      PORT: 3001
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    networks:
      - leads-internal
      - traefik-public

volumes:
  neo4j_data:
  neo4j_logs:

networks:
  leads-internal:
    driver: bridge
  traefik-public:
    external: true
