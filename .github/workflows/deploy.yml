name: Deploy

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  SITE_URL: https://leads.graphwiz.ai

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build (verify compilation)
        run: npm run build

      - name: Deploy to production
        id: deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ~/git/gi-hack
            git pull
            docker compose -f docker-compose.prod.yml build app
            docker compose -f docker-compose.prod.yml up -d app
            echo "${{ github.sha }}" > /tmp/gi-hack-deployed-sha
            docker image prune -f

      - name: Wait for container readiness
        run: sleep 15

      - name: Health check — homepage
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 ${{ env.SITE_URL }}/)
          if [ "$STATUS" != "200" ]; then
            echo "FAIL: homepage returned $STATUS"
            exit 1
          fi
          echo "OK: homepage returned $STATUS"

      - name: Health check — API health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 ${{ env.SITE_URL }}/api/health)
          if [ "$STATUS" != "200" ]; then
            echo "FAIL: /api/health returned $STATUS"
            exit 1
          fi
          echo "OK: /api/health returned $STATUS"

      - name: Health check — leads page
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 ${{ env.SITE_URL }}/leads)
          if [ "$STATUS" != "200" ]; then
            echo "FAIL: /leads returned $STATUS"
            exit 1
          fi
          echo "OK: /leads returned $STATUS"

      - name: Health check — API graph health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 ${{ env.SITE_URL }}/api/graph/health)
          if [ "$STATUS" != "200" ]; then
            echo "FAIL: /api/graph/health returned $STATUS"
            exit 1
          fi
          echo "OK: /api/graph/health returned $STATUS"

      - name: Rollback on health check failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            echo "Health check failed — rolling back to previous commit..."
            cd ~/git/gi-hack
            git reset --hard HEAD~1
            docker compose -f docker-compose.prod.yml build app
            docker compose -f docker-compose.prod.yml up -d app
            echo "Rollback complete."
